---
layout: default
---

<div class="apps" id="apps"></div>

<!-- We use JS now for rendering due to its filtering capabilities, but fall back to standard HTML. -->
<noscript>
    <!-- Make the JS-version of the app list take up zero space. -->
    <style>
        #apps {
            display: none;
        }
    </style>
    <div class="apps">
        {% for app in site.apps %}
            <div class="app">
                <div class="title">
                    <h2>{{ app.name }}</h2>

                    <span class="badge" title="The version the app is tested for">
                        <code>v{{ app.version }}</code>
                    </span>
                </div>

                <p>
                    {{ app.description }}
                </p>

                <div>
                    <span><b>NOTE:</b> <i>{{ app.notes }}</i></span>
                </div>

                <div class="footer">
                    <a class="play-store-link" href="{{ app.link }}">Play Store</a>
                </div>
            </div>
        {% endfor %}
    </div>
</noscript>
